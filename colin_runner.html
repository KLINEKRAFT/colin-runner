<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Colin Runner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }

  #gameWrapper {
    position: relative;
    width: 393px;
    height: 852px;
    overflow: hidden;
    background: #0d0d1a;
  }

  /* Parallax sky layers */
  #sky {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #0a0014 0%, #1a0030 40%, #2a0a50 70%, #1a1040 100%);
  }

  #stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 8%, #ddf 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 20%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 5%, #ffd 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 12%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 18%, #ddf 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 30%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 25%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 35%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 40%, #ffd 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 45%, #ddf 0%, transparent 100%);
    animation: twinkle 3s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    0% { opacity: 0.7; }
    100% { opacity: 1; }
  }

  /* Neon city buildings - far */
  #cityFar {
    position: absolute;
    bottom: 180px;
    left: 0;
    width: 200%;
    height: 300px;
    display: flex;
    animation: scrollFar 20s linear infinite;
  }

  /* Neon city buildings - near */
  #cityNear {
    position: absolute;
    bottom: 180px;
    left: 0;
    width: 200%;
    height: 220px;
    display: flex;
    animation: scrollNear 8s linear infinite;
  }

  @keyframes scrollFar {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @keyframes scrollNear {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* Ground */
  #ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 180px;
    background: linear-gradient(180deg, #0f0f2a 0%, #080814 100%);
    border-top: 2px solid #7b00ff;
    box-shadow: 0 -4px 30px #7b00ff88, 0 -1px 0 #ff00aa44;
  }

  /* Grid floor */
  #grid {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 180px;
    background-image:
      linear-gradient(to right, #7b00ff22 1px, transparent 1px),
      linear-gradient(to bottom, #7b00ff22 1px, transparent 1px);
    background-size: 40px 40px;
    perspective: 200px;
    overflow: hidden;
  }

  #gridLines {
    position: absolute;
    bottom: 0;
    left: -100%;
    width: 300%;
    height: 100%;
    background-image:
      linear-gradient(to right, #ff00aa33 1px, transparent 1px),
      linear-gradient(to bottom, #7b00ff44 1px, transparent 1px);
    background-size: 60px 30px;
    animation: gridScroll 0.5s linear infinite;
  }

  @keyframes gridScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(60px); }
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #hud {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    padding: 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
  }

  #scoreDisplay {
    color: #ff00aa;
    font-size: 11px;
    text-shadow: 0 0 10px #ff00aa, 0 0 20px #ff00aa88;
    line-height: 1.8;
  }

  #livesDisplay {
    color: #7b00ff;
    font-size: 14px;
    text-shadow: 0 0 10px #7b00ff;
  }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(5, 0, 20, 0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    gap: 24px;
  }

  #overlay h1 {
    color: #ff00aa;
    font-size: 28px;
    text-shadow: 0 0 20px #ff00aa, 0 0 40px #ff00aa66;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.5;
  }

  #overlay .subtitle {
    color: #7b00ff;
    font-size: 9px;
    text-shadow: 0 0 10px #7b00ff;
    text-align: center;
    line-height: 2;
    opacity: 0.9;
  }

  #startBtn {
    background: transparent;
    border: 2px solid #ff00aa;
    color: #ff00aa;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 14px 28px;
    cursor: pointer;
    text-shadow: 0 0 10px #ff00aa;
    box-shadow: 0 0 20px #ff00aa44, inset 0 0 20px #ff00aa11;
    animation: pulse 1.5s ease-in-out infinite alternate;
    letter-spacing: 1px;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 10px #ff00aa44, inset 0 0 10px #ff00aa11; }
    100% { box-shadow: 0 0 30px #ff00aaaa, inset 0 0 20px #ff00aa33; }
  }

  #gameOver {
    position: absolute;
    inset: 0;
    background: rgba(5, 0, 20, 0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    gap: 20px;
  }

  #gameOver h2 {
    color: #ff2244;
    font-size: 22px;
    text-shadow: 0 0 20px #ff2244;
    text-align: center;
  }

  #finalScore {
    color: #fff;
    font-size: 9px;
    text-align: center;
    line-height: 2;
  }

  #restartBtn {
    background: transparent;
    border: 2px solid #7b00ff;
    color: #7b00ff;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 12px 24px;
    cursor: pointer;
    text-shadow: 0 0 10px #7b00ff;
    box-shadow: 0 0 20px #7b00ff44;
    animation: pulse2 1.5s ease-in-out infinite alternate;
  }

  @keyframes pulse2 {
    0% { box-shadow: 0 0 10px #7b00ff44; }
    100% { box-shadow: 0 0 30px #7b00ffaa; }
  }

  #speedIndicator {
    position: absolute;
    bottom: 195px;
    right: 16px;
    color: #7b00ff88;
    font-size: 7px;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <div id="sky"></div>
  <div id="stars"></div>
  <div id="cityFar" id="cityFar"></div>
  <div id="cityNear" id="cityNear"></div>
  <div id="ground">
    <div id="grid"><div id="gridLines"></div></div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div id="scoreDisplay">
      <div>SCORE</div>
      <div id="scoreVal">000000</div>
      <div style="margin-top:8px">HI</div>
      <div id="hiVal">000000</div>
    </div>
    <div id="livesDisplay" id="livesDisplay">♥♥♥</div>
  </div>

  <div id="speedIndicator">SPEED ×<span id="speedVal">1.0</span></div>

  <div id="overlay">
    <h1>COLIN<br>RUNNER</h1>
    <div class="subtitle">TAP OR SPACE TO JUMP<br>DOUBLE TAP = DOUBLE JUMP<br><br>AVOID THE OBSTACLES</div>
    <button id="startBtn" onclick="startGame()">▶ START</button>
  </div>

  <div id="gameOver">
    <h2>GAME OVER</h2>
    <div id="finalScore"></div>
    <button id="restartBtn" onclick="startGame()">↺ RETRY</button>
  </div>
</div>

<script>
const GAME_W = 393;
const GAME_H = 852;
const GROUND_Y = GAME_H - 180;
const SPRITE_COLS = 6;
const SPRITE_ROWS = 1;
const SPRITE_W = 192;
const SPRITE_H = 192;
const PLAYER_SCALE = 0.65;
const PLAYER_W = SPRITE_W * PLAYER_SCALE;
const PLAYER_H = SPRITE_H * PLAYER_SCALE;
const PLAYER_X = 80;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = GAME_W;
canvas.height = GAME_H;

const spriteImg = new Image();
spriteImg.src = '/mnt/user-data/uploads/colin_walk.png';

// Fallback: inline the sprite as base64 if path doesn't work in browser
// We'll draw placeholder if image fails
let spriteLoaded = false;
spriteImg.onload = () => { spriteLoaded = true; };

let gameRunning = false;
let score = 0;
let hiScore = 0;
let lives = 3;
let frame = 0;
let frameTimer = 0;
let currentFrame = 0;
let speed = 4;
let speedMultiplier = 1;
let jumpCount = 0;

let player = {
  x: PLAYER_X,
  y: GROUND_Y - PLAYER_H,
  vy: 0,
  onGround: true,
  jumpCount: 0,
  invincible: 0,
  squish: 1,
};

const GRAVITY = 0.55;
const JUMP_FORCE = -14;
const MAX_JUMPS = 2;

let obstacles = [];
let particles = [];
let obstacleTimer = 0;
let obstacleInterval = 90;

// Build city backgrounds
function buildCities() {
  const farDiv = document.getElementById('cityFar');
  const nearDiv = document.getElementById('cityNear');
  farDiv.innerHTML = '';
  nearDiv.innerHTML = '';

  const farSvg = makeCitySVG(800, 300, 'far');
  const nearSvg = makeCitySVG(800, 220, 'near');

  // duplicate for seamless scroll
  for (let i = 0; i < 2; i++) {
    const fd = document.createElement('div');
    fd.style.cssText = 'flex-shrink:0;width:800px;height:300px;';
    fd.innerHTML = farSvg;
    farDiv.appendChild(fd);

    const nd = document.createElement('div');
    nd.style.cssText = 'flex-shrink:0;width:800px;height:220px;';
    nd.innerHTML = nearSvg;
    nearDiv.appendChild(nd);
  }
}

function makeCitySVG(w, h, type) {
  const isFar = type === 'far';
  const colors = isFar
    ? ['#1a0040', '#120030', '#0f0028', '#180038', '#150035']
    : ['#220050', '#1a0040', '#250058', '#1e0048', '#200050'];
  const accentColors = ['#ff00aa', '#7b00ff', '#00ffee', '#ff6600', '#ffcc00'];

  let rects = '';
  let x = 0;
  while (x < w) {
    const bw = 30 + Math.random() * 60;
    const bh = (isFar ? 60 : 80) + Math.random() * (isFar ? 180 : 120);
    const color = colors[Math.floor(Math.random() * colors.length)];
    const accent = accentColors[Math.floor(Math.random() * accentColors.length)];
    const by = h - bh;

    rects += `<rect x="${x}" y="${by}" width="${bw}" height="${bh}" fill="${color}" />`;

    // Windows
    for (let wy = by + 8; wy < h - 10; wy += 14) {
      for (let wx = x + 4; wx < x + bw - 8; wx += 12) {
        if (Math.random() > 0.35) {
          const wc = Math.random() > 0.8 ? accent : '#ffffff22';
          rects += `<rect x="${wx}" y="${wy}" width="6" height="8" fill="${wc}" opacity="0.7"/>`;
        }
      }
    }

    // Neon top line
    if (Math.random() > 0.5) {
      rects += `<line x1="${x}" y1="${by}" x2="${x+bw}" y2="${by}" stroke="${accent}" stroke-width="1.5" opacity="0.8"/>`;
    }

    x += bw + (isFar ? 2 : 4) + Math.random() * 10;
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">${rects}</svg>`;
}

function spawnObstacle() {
  const types = ['barrier', 'gap_warning', 'hover_car'];
  const t = types[Math.floor(Math.random() * types.length)];
  let obs = { x: GAME_W + 20, type: t, hit: false };

  if (t === 'barrier') {
    obs.w = 28 + Math.random() * 20;
    obs.h = 40 + Math.random() * 50;
    obs.y = GROUND_Y - obs.h;
    obs.color = Math.random() > 0.5 ? '#ff00aa' : '#7b00ff';
  } else if (t === 'gap_warning') {
    obs.w = 36;
    obs.h = 55;
    obs.y = GROUND_Y - obs.h;
    obs.color = '#ff6600';
  } else {
    obs.w = 70;
    obs.h = 28;
    obs.y = GROUND_Y - PLAYER_H * 0.7 - 40 - Math.random() * 30;
    obs.color = '#00ffee';
  }
  obstacles.push(obs);
}

function spawnParticle(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 1) * 6,
      life: 1,
      color,
      size: 3 + Math.random() * 4,
    });
  }
}

function jump() {
  if (!gameRunning) return;
  if (player.jumpCount < MAX_JUMPS) {
    player.vy = JUMP_FORCE * (player.jumpCount === 1 ? 0.85 : 1);
    player.jumpCount++;
    player.onGround = false;
    player.squish = 0.7;
    spawnParticle(player.x + PLAYER_W / 2, player.y + PLAYER_H, '#7b00ff');
  }
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('gameOver').style.display = 'none';
  score = 0;
  lives = 3;
  speed = 4;
  speedMultiplier = 1;
  obstacles = [];
  particles = [];
  obstacleTimer = 0;
  obstacleInterval = 90;
  player.y = GROUND_Y - PLAYER_H;
  player.vy = 0;
  player.onGround = true;
  player.jumpCount = 0;
  player.invincible = 0;
  gameRunning = true;
  updateHUD();
  requestAnimationFrame(gameLoop);
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = String(Math.floor(score)).padStart(6, '0');
  document.getElementById('hiVal').textContent = String(Math.floor(hiScore)).padStart(6, '0');
  document.getElementById('livesDisplay').textContent = '♥'.repeat(Math.max(0, lives)) + '♡'.repeat(Math.max(0, 3 - lives));
  document.getElementById('speedVal').textContent = speedMultiplier.toFixed(1);
}

function gameLoop() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, GAME_W, GAME_H);

  // Score & speed
  score += 0.1 * speedMultiplier;
  speedMultiplier = 1 + Math.floor(score / 200) * 0.2;
  speed = 4 * speedMultiplier;
  obstacleInterval = Math.max(45, 90 - Math.floor(score / 100) * 5);

  // Update player
  player.vy += GRAVITY;
  player.y += player.vy;
  player.squish += (1 - player.squish) * 0.2;

  if (player.y >= GROUND_Y - PLAYER_H) {
    player.y = GROUND_Y - PLAYER_H;
    player.vy = 0;
    player.onGround = true;
    player.jumpCount = 0;
    player.squish = 1.2;
  } else {
    player.onGround = false;
  }

  if (player.invincible > 0) player.invincible--;

  // Sprite animation
  frameTimer++;
  if (frameTimer >= 5) {
    frameTimer = 0;
    currentFrame = (currentFrame + 1) % SPRITE_COLS;
  }

  // Obstacles
  obstacleTimer++;
  if (obstacleTimer >= obstacleInterval) {
    obstacleTimer = 0;
    spawnObstacle();
  }

  obstacles.forEach(o => { o.x -= speed; });
  obstacles = obstacles.filter(o => o.x > -100);

  // Collision
  if (player.invincible === 0) {
    obstacles.forEach(o => {
      if (o.hit) return;
      const px = player.x + 10;
      const pw = PLAYER_W - 20;
      const py = player.y + 10;
      const ph = PLAYER_H - 15;
      if (px < o.x + o.w && px + pw > o.x && py < o.y + o.h && py + ph > o.y) {
        o.hit = true;
        lives--;
        player.invincible = 90;
        spawnParticle(player.x + PLAYER_W / 2, player.y + PLAYER_H / 2, '#ff2244');
        if (lives <= 0) {
          endGame();
          return;
        }
      }
    });
  }

  // Particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life -= 0.04;
    p.size *= 0.96;
  });
  particles = particles.filter(p => p.life > 0);

  // Draw obstacles
  obstacles.forEach(o => {
    ctx.save();
    if (o.type === 'barrier') {
      // Neon barrier
      ctx.shadowColor = o.color;
      ctx.shadowBlur = 15;
      ctx.fillStyle = o.color + '33';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.strokeStyle = o.color;
      ctx.lineWidth = 2;
      ctx.strokeRect(o.x, o.y, o.w, o.h);
      // Hazard stripes
      ctx.shadowBlur = 0;
      for (let i = 0; i < o.h; i += 16) {
        if ((Math.floor(i / 16)) % 2 === 0) {
          ctx.fillStyle = o.color + '44';
          ctx.fillRect(o.x, o.y + i, o.w, 8);
        }
      }
    } else if (o.type === 'gap_warning') {
      ctx.shadowColor = '#ff6600';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#ff660022';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.strokeStyle = '#ff6600';
      ctx.lineWidth = 2;
      ctx.strokeRect(o.x, o.y, o.w, o.h);
      // Lightning bolt symbol
      ctx.fillStyle = '#ff6600';
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('⚡', o.x + o.w / 2, o.y + o.h / 2 + 10);
    } else {
      // Hover car
      ctx.shadowColor = '#00ffee';
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#00ffee22';
      ctx.beginPath();
      ctx.roundRect(o.x, o.y, o.w, o.h, 8);
      ctx.fill();
      ctx.strokeStyle = '#00ffee';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Headlights
      ctx.fillStyle = '#00ffee';
      ctx.fillRect(o.x + 2, o.y + 8, 4, 12);
      ctx.fillRect(o.x + 2, o.y + o.h - 20, 4, 12);
      // Engine glow
      ctx.fillStyle = '#ff00aa55';
      ctx.fillRect(o.x + o.w - 8, o.y + 4, 6, o.h - 8);
    }
    ctx.restore();
  });

  // Draw particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.restore();
  });

  // Draw player
  ctx.save();
  const blink = player.invincible > 0 && Math.floor(player.invincible / 6) % 2 === 0;
  if (!blink) {
    const cx = player.x + PLAYER_W / 2;
    const cy = player.y + PLAYER_H;
    ctx.translate(cx, cy);
    const sy = player.squish;
    const sx = 1 + (1 - sy) * 0.5;
    ctx.scale(sx, sy);
    ctx.translate(-cx, -cy);

    if (spriteLoaded) {
      ctx.drawImage(
        spriteImg,
        currentFrame * SPRITE_W, 0,
        SPRITE_W, SPRITE_H,
        player.x, player.y,
        PLAYER_W, PLAYER_H
      );
    } else {
      // Placeholder rectangle
      ctx.fillStyle = '#ff00aa';
      ctx.fillRect(player.x, player.y, PLAYER_W, PLAYER_H);
    }

    // Neon glow under feet
    if (player.onGround) {
      const grad = ctx.createRadialGradient(
        player.x + PLAYER_W / 2, GROUND_Y, 0,
        player.x + PLAYER_W / 2, GROUND_Y, 40
      );
      grad.addColorStop(0, '#ff00aa44');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(player.x - 10, GROUND_Y - 10, PLAYER_W + 20, 20);
    }
  }
  ctx.restore();

  updateHUD();
  if (score > hiScore) hiScore = score;

  frame++;
  requestAnimationFrame(gameLoop);
}

function endGame() {
  gameRunning = false;
  if (score > hiScore) hiScore = score;
  const go = document.getElementById('gameOver');
  go.style.display = 'flex';
  document.getElementById('finalScore').innerHTML =
    `SCORE<br>${String(Math.floor(score)).padStart(6,'0')}<br><br>BEST<br>${String(Math.floor(hiScore)).padStart(6,'0')}`;
}

// Input
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    jump();
  }
});

let lastTap = 0;
document.getElementById('gameWrapper').addEventListener('touchstart', e => {
  e.preventDefault();
  jump();
}, { passive: false });

document.getElementById('gameWrapper').addEventListener('click', e => {
  if (gameRunning) jump();
});

buildCities();
</script>
</body>
</html>
